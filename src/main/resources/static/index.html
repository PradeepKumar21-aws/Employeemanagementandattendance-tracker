<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Employee Management System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
padding:20px;
background:#f5f5f5;
}
.card{
margin-bottom:20px;
}
</style>
</head>

<body>

<div class="container">

<h2 class="text-center mb-4">
Employee Management System
</h2>

<div class="card">
<div class="card-header">
Add Employee
</div>

<div class="card-body">

<input id="employeeId" class="form-control mb-2" placeholder="Employee ID">

<input id="name" class="form-control mb-2" placeholder="Name">

<input id="department" class="form-control mb-2" placeholder="Department">

<input id="role" class="form-control mb-2" placeholder="Role">

<input id="email" class="form-control mb-2" placeholder="Email">

<input id="phone" class="form-control mb-2" placeholder="Phone">

<button class="btn btn-success" onclick="addEmployee()">
Add Employee
</button>

</div>
</div>

<div class="card">
<div class="card-header">
Employee List
</div>

<div class="card-body">

<table class="table table-bordered">

<thead>
<tr>
<th>ID</th>
<th>Emp ID</th>
<th>Name</th>
<th>Department</th>
<th>Role</th>
<th>Email</th>
<th>Phone</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="employeeTable"></tbody>

</table>

</div>
</div>

</div>

<script>

const API="/api/employees";

async function loadEmployees(){

const response=await fetch(API);

const data=await response.json();

let rows="";

data.content.forEach(emp=>{

rows += `
<tr>
<td>${emp.id}</td>
<td>${emp.employeeId}</td>
<td>${emp.name}</td>
<td>${emp.department}</td>
<td>${emp.role}</td>
<td>${emp.email}</td>
<td>${emp.phone}</td>
<td>
<button class="btn btn-danger btn-sm"
onclick="deleteEmployee(${emp.id})">
Delete
</button>
</td>
</tr>
`;

});

document.getElementById("employeeTable").innerHTML=rows;

}

async function addEmployee(){

const employee={
employeeId:document.getElementById("employeeId").value,
name:document.getElementById("name").value,
department:document.getElementById("department").value,
role:document.getElementById("role").value,
email:document.getElementById("email").value,
phone:document.getElementById("phone").value
};

await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(employee)
});

loadEmployees();

}

async function deleteEmployee(id){

await fetch(API+"/"+id,{
method:"DELETE"
});

loadEmployees();

}

loadEmployees();

</script>

</body>
</html>
